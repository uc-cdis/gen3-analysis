components:
  schemas:
    AvailabilityRequest:
      description: "Request body for POST /gene_expression/availability.\n\nAt least\
        \ one of case_ids, gene_ids, case_filters, or cohort_id must be provided.\n\
        \nNOTE: case_set_id and gene_set_id are NOT supported.\n\nAttributes:\n  \
        \  case_ids: List of case UUIDs to check availability for\n    gene_ids: List\
        \ of ENSEMBL gene IDs to check availability for\n    case_filters: Filter\
        \ object for querying cases (GDC filter format)\n    cohort_id: Identifier\
        \ for a saved cohort"
      properties:
        case_filters:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: A filter for cases
          title: Case Filters
        case_ids:
          anyOf:
          - items:
              type: string
            minItems: 1
            type: array
          - type: 'null'
          description: A list of IDs for cases
          title: Case Ids
        cohort_id:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: An identifier for a cohort
          title: Cohort Id
        gene_ids:
          anyOf:
          - items:
              type: string
            minItems: 1
            type: array
          - type: 'null'
          description: A list of human ENSEMBL gene IDs
          title: Gene Ids
      title: AvailabilityRequest
      type: object
    AvailabilityResponse:
      description: "Response body for POST /gene_expression/availability.\n\nAttributes:\n\
        \    genes: Availability information for genes (if gene_ids were requested)\n\
        \    cases: Availability information for cases (if case_ids were requested)"
      properties:
        cases:
          anyOf:
          - $ref: '#/components/schemas/CaseResourceAvailability'
          - type: 'null'
          description: Case availability information
        genes:
          anyOf:
          - $ref: '#/components/schemas/GeneResourceAvailability'
          - type: 'null'
          description: Gene availability information
      title: AvailabilityResponse
      type: object
    CNVOccurrenceRequest:
      properties:
        expand:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: which fields to expand (optional)
          title: Expand
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        size:
          anyOf:
          - maximum: 1000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: page size
          title: Size
        start:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: start index
          title: Start
      title: CNVOccurrenceRequest
      type: object
    CNVRequest:
      properties:
        expand:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: which fields to expand (optional)
          title: Expand
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        size:
          anyOf:
          - maximum: 1000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: page size
          title: Size
        start:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: start index
          title: Start
      title: CNVRequest
      type: object
    CaseDetail:
      description: "Detail about a single case expression data availability.\n\nAttributes:\n\
        \    case_id: ID of the case\n    has_gene_expression_values: Whether expression\
        \ data exists for this case"
      properties:
        case_id:
          description: UUID of the case
          title: Case Id
          type: string
        has_gene_expression_values:
          description: Whether expression data exists for this case
          title: Has Gene Expression Values
          type: boolean
      required:
      - case_id
      - has_gene_expression_values
      title: CaseDetail
      type: object
    CaseResourceAvailability:
      description: "Availability summary and details for cases.\n\nAttributes:\n \
        \   with_gene_expression_count: Count of cases with expression data\n    without_gene_expression_count:\
        \ Count of cases without expression data\n    details: List of individual\
        \ case availability details"
      properties:
        details:
          description: Individual case availability details
          items:
            $ref: '#/components/schemas/CaseDetail'
          title: Details
          type: array
        with_gene_expression_count:
          description: Count of cases with expression data
          minimum: 0.0
          title: With Gene Expression Count
          type: integer
        without_gene_expression_count:
          description: Count of cases without expression data
          minimum: 0.0
          title: Without Gene Expression Count
          type: integer
      required:
      - with_gene_expression_count
      - without_gene_expression_count
      title: CaseResourceAvailability
      type: object
    CasesRequest:
      properties:
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default:
          - case_id
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        offset:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: 'offset (optional) default: 0'
          title: Offset
        size:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: 'number of cases to return (optional) default: 10'
          title: Size
      title: CasesRequest
      type: object
    CohortDownloadRequest:
      properties:
        case_ids_filter_path:
          description: path for the case ids in the query
          title: Case Ids Filter Path
          type: string
        case_index:
          anyOf:
          - type: string
          - type: 'null'
          default: CaseCentric_case_centric
          description: case index to query
          title: Case Index
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: case filter (optional)
          title: Cohort Filter
        cohort_item_field:
          anyOf:
          - type: string
          - type: 'null'
          default: case_id
          description: identity field for the case
          title: Cohort Item Field
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields to download (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: query filter (optional)
          title: Filter
        index:
          description: index to download from
          title: Index
          type: string
      required:
      - case_ids_filter_path
      - index
      title: CohortDownloadRequest
      type: object
    CohortQueryRequest:
      properties:
        case_ids_filter_path:
          description: path for the case ids in the query
          title: Case Ids Filter Path
          type: string
        case_index:
          anyOf:
          - type: string
          - type: 'null'
          default: CaseCentric_case_centric
          description: case index to query
          title: Case Index
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: case filter (optional)
          title: Cohort Filter
        cohort_item_field:
          anyOf:
          - type: string
          - type: 'null'
          default: case_id
          description: identity field for the case
          title: Cohort Item Field
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: query filter (optional)
          title: Filter
        limit:
          anyOf:
          - type: integer
          - type: 'null'
          default: 10000
          description: set the number of responses (optional)
          title: Limit
        query:
          anyOf:
          - type: string
          - type: 'null'
          default: ''
          description: the query to execute using the case ids found using the cohort_filter(optional)
          title: Query
        sort:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          description: set the sort order (optional)
          title: Sort
      required:
      - case_ids_filter_path
      title: CohortQueryRequest
      type: object
    CompareSurvivalRequest:
      properties:
        doc_type:
          anyOf:
          - type: string
          - type: 'null'
          default: CaseCentric_case_centric
          description: set the index for case queries
          title: Doc Type
        field:
          title: Field
          type: string
        filters:
          items:
            additionalProperties: true
            type: object
          title: Filters
          type: array
        limit:
          default: 10000
          title: Limit
          type: integer
        mode:
          anyOf:
          - type: string
          - type: 'null'
          default: intersection
          description: 'set the mode for the plot. modes are: intersection, compare,
            s0_minus_s1, s1_minus_s0'
          title: Mode
      required:
      - filters
      - field
      title: CompareSurvivalRequest
      type: object
    FacetComparisonRequest:
      properties:
        cohort1:
          additionalProperties: true
          title: Cohort1
          type: object
        cohort2:
          additionalProperties: true
          title: Cohort2
          type: object
        doc_type:
          anyOf:
          - type: string
          - type: 'null'
          default: case_centric
          title: Doc Type
        facets:
          items: {}
          title: Facets
          type: array
        interval:
          additionalProperties:
            type: integer
          default: {}
          title: Interval
          type: object
      required:
      - cohort1
      - cohort2
      - facets
      title: FacetComparisonRequest
      type: object
    FacetRequest:
      properties:
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Case filter (optional)
          title: Cohort Filter
        genomic_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Genomic filters
          title: Genomic Filter
      title: FacetRequest
      type: object
    FilesRequest:
      properties:
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default:
          - file_id
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        offset:
          default: 0
          description: 'offset (optional) default: 0'
          maximum: 10000.0
          minimum: 0.0
          title: Offset
          type: integer
        size:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: 'number of files to return (optional) default: 10'
          title: Size
      title: FilesRequest
      type: object
    GeneCaseIdsRequest:
      properties:
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Case filter (optional)
          title: Cohort Filter
        gene_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Gene filters
          title: Gene Filter
        ssm_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: SSM filters
          title: Ssm Filter
      title: GeneCaseIdsRequest
      type: object
    GeneDetail:
      description: "Detail about a single gene expression data availability.\n\nAttributes:\n\
        \    gene_id: ENSEMBL gene ID\n    has_gene_expression_values: Whether expression\
        \ data exists for this gene"
      properties:
        gene_id:
          description: ENSEMBL gene ID
          title: Gene Id
          type: string
        has_gene_expression_values:
          description: Whether expression data exists for this gene
          title: Has Gene Expression Values
          type: boolean
      required:
      - gene_id
      - has_gene_expression_values
      title: GeneDetail
      type: object
    GeneResourceAvailability:
      description: "Availability summary and details for genes.\n\nAttributes:\n \
        \   with_gene_expression_count: Count of genes with expression data\n    without_gene_expression_count:\
        \ Count of genes without expression data\n    details: List of individual\
        \ gene availability details"
      properties:
        details:
          description: Individual gene availability details
          items:
            $ref: '#/components/schemas/GeneDetail'
          title: Details
          type: array
        with_gene_expression_count:
          description: Count of genes with expression data
          minimum: 0.0
          title: With Gene Expression Count
          type: integer
        without_gene_expression_count:
          description: Count of genes without expression data
          minimum: 0.0
          title: Without Gene Expression Count
          type: integer
      required:
      - with_gene_expression_count
      - without_gene_expression_count
      title: GeneResourceAvailability
      type: object
    GeneSelectionRequest:
      description: "Request body for POST /gene_expression/gene_selection.\n\nMust\
        \ provide exactly one way to specify cases and exactly one way to specify\
        \ genes.\n\nNote: case_set_id and gene_set_id are NOT supported in Gen3.\n\
        \nAttributes:\n    case_ids: List of case UUIDs\n    case_filters: Filter\
        \ object for querying cases\n    cohort_id: Identifier for a saved cohort\n\
        \    gene_ids: List of ENSEMBL gene IDs\n    gene_type: Type of genes (e.g.,\
        \ \"protein_coding\" for all protein-coding genes)\n    selection_size: Maximum\
        \ number of genes to select (required, >= 1)\n    min_median_log2_uqfpkm:\
        \ Minimum median log2(FPKM-UQ+1) threshold for eligibility"
      properties:
        case_filters:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: A filter for GDC cases
          title: Case Filters
        case_ids:
          anyOf:
          - items:
              type: string
            minItems: 1
            type: array
          - type: 'null'
          description: A list of UUIDs for cases
          title: Case Ids
        cohort_id:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: An identifier for a saved cohort
          title: Cohort Id
        gene_ids:
          anyOf:
          - items:
              type: string
            minItems: 1
            type: array
          - type: 'null'
          description: A list of human ENSEMBL gene IDs
          title: Gene Ids
        gene_type:
          anyOf:
          - $ref: '#/components/schemas/GeneType'
          - type: 'null'
          description: The type of genes (e.g., protein_coding)
        min_median_log2_uqfpkm:
          default: 1.0
          description: The inclusive minimum value for the median log2(FPKM-UQ+1)
          title: Min Median Log2 Uqfpkm
          type: number
        selection_size:
          description: The maximum number of genes to select
          minimum: 1.0
          title: Selection Size
          type: integer
      required:
      - selection_size
      title: GeneSelectionRequest
      type: object
    GeneSelectionResponse:
      description: "Response body for POST /gene_expression/gene_selection.\n\nAttributes:\n\
        \    genes: List of selected genes, sorted by stddev descending"
      properties:
        genes:
          description: Selected genes sorted by standard deviation descending
          items:
            $ref: '#/components/schemas/SelectedGene'
          title: Genes
          type: array
      required:
      - genes
      title: GeneSelectionResponse
      type: object
    GeneType:
      description: "Type of genes to include in queries.\n\nAttributes:\n    PROTEIN_CODING:\
        \ All protein-coding genes"
      enum:
      - protein_coding
      title: GeneType
      type: string
    GenomicSurvivalRequest:
      properties:
        case_filter:
          additionalProperties: true
          title: Case Filter
          type: object
        filter:
          additionalProperties: true
          title: Filter
          type: object
        limit:
          default: 10000
          title: Limit
          type: integer
        symbol:
          description: symbol to compare
          title: Symbol
          type: string
        type:
          anyOf:
          - type: string
          - type: 'null'
          default: gene
          description: set the type of plot gene or ssm
          title: Type
      required:
      - case_filter
      - filter
      - symbol
      title: GenomicSurvivalRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    IntersectionRequest:
      properties:
        cohort1:
          additionalProperties: true
          title: Cohort1
          type: object
        cohort2:
          additionalProperties: true
          title: Cohort2
          type: object
        doc_type:
          anyOf:
          - type: string
          - type: 'null'
          default: case_centric
          title: Doc Type
        precision_threshold:
          default: 3000
          title: Precision Threshold
          type: integer
      required:
      - cohort1
      - cohort2
      title: IntersectionRequest
      type: object
    OutputFormat:
      description: "Output format for gene expression values.\n\nAttributes:\n   \
        \ TSV: Tab-separated values (default)\n    JSON: JSON format"
      enum:
      - tsv
      - json
      title: OutputFormat
      type: string
    PlotRequest:
      properties:
        filters:
          items:
            additionalProperties: true
            type: object
          title: Filters
          type: array
      required:
      - filters
      title: PlotRequest
      type: object
    SSMSOccurrenceRequest:
      properties:
        expand:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: which fields to expand (optional)
          title: Expand
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        size:
          anyOf:
          - maximum: 1000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: page size
          title: Size
        start:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: start index
          title: Start
      title: SSMSOccurrenceRequest
      type: object
    SSMSRequest:
      properties:
        expand:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: which fields to expand (optional)
          title: Expand
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        size:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: page size
          title: Size
        start:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: start index
          title: Start
      title: SSMSRequest
      type: object
    SelectedGene:
      description: "A gene selected by the gene selection algorithm.\n\nAttributes:\n\
        \    gene_id: ENSEMBL gene ID\n    symbol: Gene symbol\n    log2_uqfpkm_stddev:\
        \ Standard deviation of log2(uqfpkm+1) across cases\n    log2_uqfpkm_median:\
        \ Median of log2(uqfpkm+1) across cases"
      properties:
        gene_id:
          description: ENSEMBL gene ID
          title: Gene Id
          type: string
        log2_uqfpkm_median:
          description: Median of log2(uqfpkm+1) across cases
          title: Log2 Uqfpkm Median
          type: number
        log2_uqfpkm_stddev:
          description: Standard deviation of log2(uqfpkm+1) across cases
          title: Log2 Uqfpkm Stddev
          type: number
        symbol:
          description: Gene symbol
          title: Symbol
          type: string
      required:
      - gene_id
      - symbol
      - log2_uqfpkm_stddev
      - log2_uqfpkm_median
      title: SelectedGene
      type: object
    TSVUnits:
      description: "Units for gene expression values in TSV output format.\n\nAttributes:\n\
        \    UQFPKM: Raw FPKM-UQ values (default)\n    MEDIAN_CENTERED_LOG2_UQFPKM:\
        \ Median-centered log2(FPKM-UQ+1) values"
      enum:
      - uqfpkm
      - median_centered_log2_uqfpkm
      title: TSVUnits
      type: string
    TopGeneChartRequest:
      properties:
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Case filter (optional)
          title: Cohort Filter
        gene_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Gene filter (optional)
          title: Gene Filter
        offset:
          anyOf:
          - minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          title: Offset
        search:
          anyOf:
          - type: string
          - type: 'null'
          description: Search term (optional)
          title: Search
        size:
          anyOf:
          - maximum: 100000000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 20
          title: Size
        ssm_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Mutation filter (optional)
          title: Ssm Filter
      title: TopGeneChartRequest
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    ValuesRequest:
      description: "Request body for POST /gene_expression/values.\n\nMust provide\
        \ at least one way to specify cases (case_ids, case_filters, or cohort_id)\n\
        and at least one way to specify genes (gene_ids).\n\nNote: case_set_id and\
        \ gene_set_id are NOT supported in Gen3.\n\nAttributes:\n    case_ids: List\
        \ of case UUIDs\n    gene_ids: List of ENSEMBL gene IDs\n    case_filters:\
        \ Filter object for querying cases\n    cohort_id: Identifier for a saved\
        \ cohort\n    format: Output format (tsv or json), defaults to tsv\n    tsv_units:\
        \ Units for expression values if format=tsv"
      properties:
        case_filters:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: A filter for GDC cases
          title: Case Filters
        case_ids:
          anyOf:
          - items:
              type: string
            minItems: 1
            type: array
          - type: 'null'
          description: A list of UUIDs for cases
          title: Case Ids
        cohort_id:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: An identifier for a saved cohort
          title: Cohort Id
        format:
          $ref: '#/components/schemas/OutputFormat'
          default: tsv
          description: The data format of the response
        gene_ids:
          anyOf:
          - items:
              type: string
            minItems: 1
            type: array
          - type: 'null'
          description: A list of human ENSEMBL gene IDs
          title: Gene Ids
        tsv_units:
          $ref: '#/components/schemas/TSVUnits'
          default: uqfpkm
          description: The units of gene expression data if format=tsv
      title: ValuesRequest
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  title: Gen3 Analysis Service
  version: 1.0.3
openapi: 3.1.0
paths:
  /:
    get:
      description: Directs client to the docs
      operationId: redirect_to_docs__get
      responses:
        '307':
          description: Successful Response
      summary: Get swagger docs
      tags:
      - Basic
  /_status/:
    get:
      description: Gets the current status of the service
      operationId: get_status__status__get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: No content
        '500':
          description: No content
      summary: Get service status
      tags:
      - Basic
  /_version/:
