  /gene_expression/gene_selection:
    post:
      description: "Select the most variably expressed genes for a collection of cases\
        \ and genes.\n\n    Selection algorithm:\n    1. For each gene, compute log2(FPKM-UQ\
        \ + 1) values (pre-computed)\n    2. Exclude genes with stddev \u2248 0 (no\
        \ variation)\n    3. Exclude genes with median < min_median_log2_uqfpkm\n\
        \    4. Sort remaining genes by stddev descending\n    5. Return top selection_size\
        \ genes\n\n    Note: case_set_id and gene_set_id parameters are NOT supported\
        \ in Gen3."
      operationId: gene_selection_gene_expression_gene_selection_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneSelectionRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneSelectionResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Select most variably expressed genes
      tags:
      - Gene Expression
  /gene_expression/values:
    post:
      description: "Get gene expression values for the specified cases and genes.\n\
        \n    Returns expression values in TSV (default) or JSON format.\n\n    For\
        \ TSV format, use tsv_units to specify the units:\n    - uqfpkm: Raw FPKM-UQ\
        \ values (default)\n    - median_centered_log2_uqfpkm: Median-centered log2(FPKM-UQ+1)\
        \ values"
      operationId: values_gene_expression_values_post
      requestBody:
        content:
          application/json:
            schema:
