components:
  schemas:
    CasesRequest:
      properties:
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default:
          - case_id
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        offset:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: 'offset (optional) default: 0'
          title: Offset
        size:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: 'number of cases to return (optional) default: 10'
          title: Size
      title: CasesRequest
      type: object
    CohortQueryRequest:
      properties:
        case_ids_filter_path:
          description: path for the case ids in the query
          title: Case Ids Filter Path
          type: string
        case_index:
          description: case index to query
          title: Case Index
          type: string
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: case filter (optional)
          title: Cohort Filter
        cohort_item_field:
          description: identity field for the case
          title: Cohort Item Field
          type: string
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: query filter (optional)
          title: Filter
        limit:
          anyOf:
          - type: integer
          - type: 'null'
          default: 10000
          description: set the number of responses (optional)
          title: Limit
        query:
          anyOf:
          - type: string
          - type: 'null'
          default: ''
          description: the query to execute using the case ids found using the cohort_filter(optional)
          title: Query
      required:
      - case_ids_filter_path
      - case_index
      - cohort_item_field
      title: CohortQueryRequest
      type: object
    CompareSurvivalRequest:
      properties:
        doc_type:
          anyOf:
          - type: string
          - type: 'null'
          default: CaseCentric_case_centric
          description: set the index for case queries
          title: Doc Type
        field:
          title: Field
          type: string
        filters:
          items:
            additionalProperties: true
            type: object
          title: Filters
          type: array
        limit:
          default: 10000
          title: Limit
          type: integer
        mode:
          anyOf:
          - type: string
          - type: 'null'
          default: intersection
          description: 'set the mode for the plot. modes are: intersection, compare,
            s0_minus_s1, s1_minus_s0'
          title: Mode
      required:
      - filters
      - field
      title: CompareSurvivalRequest
      type: object
    FacetComparisonRequest:
      properties:
        cohort1:
          additionalProperties: true
          title: Cohort1
          type: object
        cohort2:
          additionalProperties: true
          title: Cohort2
          type: object
        doc_type:
          anyOf:
          - type: string
          - type: 'null'
          default: case_centric
          title: Doc Type
        facets:
          items: {}
          title: Facets
          type: array
        interval:
          additionalProperties:
            type: integer
          default: {}
          title: Interval
          type: object
      required:
      - cohort1
      - cohort2
      - facets
      title: FacetComparisonRequest
      type: object
    FacetRequest:
      properties:
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Case filter (optional)
          title: Cohort Filter
        genomic_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Genomic filters
          title: Genomic Filter
      title: FacetRequest
      type: object
    FilesRequest:
      properties:
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default:
          - file_id
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        offset:
          default: 0
          description: 'offset (optional) default: 0'
          maximum: 10000.0
          minimum: 0.0
          title: Offset
          type: integer
        size:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: 'number of files to return (optional) default: 10'
          title: Size
      title: FilesRequest
      type: object
    GenomicSurvivalRequest:
      properties:
        case_filter:
          additionalProperties: true
          title: Case Filter
          type: object
        filter:
          additionalProperties: true
          title: Filter
          type: object
        limit:
          default: 10000
          title: Limit
          type: integer
        symbol:
          description: symbol to compare
          title: Symbol
          type: string
        type:
          anyOf:
          - type: string
          - type: 'null'
          default: gene
          description: set the type of plot gene or ssm
          title: Type
      required:
      - case_filter
      - filter
      - symbol
      title: GenomicSurvivalRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    IntersectionRequest:
      properties:
        cohort1:
          additionalProperties: true
          title: Cohort1
          type: object
        cohort2:
          additionalProperties: true
          title: Cohort2
          type: object
        doc_type:
          anyOf:
          - type: string
          - type: 'null'
          default: case_centric
          title: Doc Type
        precision_threshold:
          default: 3000
          title: Precision Threshold
          type: integer
      required:
      - cohort1
      - cohort2
      title: IntersectionRequest
      type: object
    PlotRequest:
      properties:
        filters:
          items:
            additionalProperties: true
            type: object
          title: Filters
          type: array
      required:
      - filters
      title: PlotRequest
      type: object
    SSMSOccurrenceRequest:
      properties:
        expand:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: which fields to expand (optional)
          title: Expand
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        size:
          anyOf:
          - maximum: 1000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: page size
          title: Size
        start:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: start index
          title: Start
      title: SSMSOccurrenceRequest
      type: object
    SSMSRequest:
      properties:
        expand:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: which fields to expand (optional)
          title: Expand
        fields:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: fields (optional)
          title: Fields
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: filter (optional)
          title: Filter
        size:
          anyOf:
          - maximum: 1000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 10
          description: page size
          title: Size
        start:
          anyOf:
          - maximum: 10000.0
            minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          description: start index
          title: Start
      title: SSMSRequest
      type: object
    TopGeneChartRequest:
      properties:
        cohort_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Case filter (optional)
          title: Cohort Filter
        gene_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Gene filter (optional)
          title: Gene Filter
        offset:
          anyOf:
          - minimum: 0.0
            type: integer
          - type: 'null'
          default: 0
          title: Offset
        search:
          anyOf:
          - type: string
          - type: 'null'
          default: .*.*
          description: Search term (optional)
          title: Search
        size:
          anyOf:
          - maximum: 1000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          default: 20
          title: Size
        ssm_filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Mutation filter (optional)
          title: Ssm Filter
      title: TopGeneChartRequest
      type: object
    TopGenesChartRequest:
      properties:
        cohort_filters:
          additionalProperties: true
          default:
            and: []
          title: Cohort Filters
          type: object
        size:
          default: 20
          title: Size
          type: integer
        ssm_filters:
          additionalProperties: true
          default:
            and:
            - nested:
                in:
                  project_id:
                  - MMRF-COMMPASS
                path: case.project
          title: Ssm Filters
          type: object
      title: TopGenesChartRequest
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  title: Gen3 Analysis Service
  version: 1.0.3
openapi: 3.1.0
paths:
  /:
    get:
      description: Directs client to the docs
      operationId: redirect_to_docs__get
      responses:
        '307':
          description: Successful Response
      summary: Get swagger docs
      tags:
      - Basic
  /_status/:
    get:
      description: Gets the current status of the service
      operationId: get_status__status__get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: No content
        '500':
          description: No content
      summary: Get service status
      tags:
      - Basic
  /_version/:
    get:
      description: Gets the current version of the service
      operationId: get_version__version__get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Get Version  Version  Get
                type: object
          description: No content
      summary: Get current version
      tags:
      - Basic
  /cases/:
    post:
      description: Performs a cases query and returns case metadata for the matching
        cases.
      operationId: query_cases_cases__post
      parameters:
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CasesRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the cohort query
        '400':
          description: The request body is missing required fields or has invalid
            values.
        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      summary: Query case metadata
      tags:
      - Cases
  /cases/{case_id}:
    get:
      description: Performs a cases query and returns case metadata for case id
      operationId: get_case_by_id_cases__case_id__get
      parameters:
      - description: case id
        in: path
        name: case_id
        required: true
        schema:
          description: case id
          title: Case Id
          type: string
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - maxItems: 1
            minItems: 1
            prefixItems:
            - {}
            type: array
          - type: 'null'
          title: Access Token
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the case query
        '400':
          description: The request body is missing required fields or has invalid
            values.
        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      summary: Get case id metadata
      tags:
      - Cases
  /cohorts/query:
    post:
      description: Performs a cohort query and return the query for all items matching
        the ids.
      operationId: cohort_query_cohorts_query_post
      parameters:
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohortQueryRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the cohort query
        '400':
          description: The request body is missing required fields or has invalid
            values.
        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      security:
      - HTTPBearer: []
      summary: Queries for cohort ids and uses those ids as the cohort in the second
        query
      tags:
      - Cohorts
  /cohorts/top_genes_in_cohort:
    post:
      operationId: top_genes_in_cohort_cohorts_top_genes_in_cohort_post
      parameters:
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopGenesChartRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Top Genes In Cohort
      tags:
      - Cohorts
  /compare/facets:
    post:
      description: "Compare facets between two cohorts.\n\nBody:\n- **doc_type**:\
        \ the cohorts' ES document type\n- **cohort1**: filter corresponding to the\
        \ first cohort to compare\n- **cohort2**: filter corresponding to the second\
        \ cohort to compare\n- **facets**: fields to compare\n- **interval**: dictionary\
        \ of intervals for numerical facets. Example: `facets=[\"numeric_field\"]`\
        \ and `interval={\"numeric_field\": 10}`\n\nReturns:\n    dict - example:\n\
        \n        {\n            \"cohort1\": {\n                \"facets\": {\n \
        \                   \"text_field\": {\n                        \"buckets\"\
        : [\n                            {\"key\": \"value1\", \"count\": 99},\n \
        \                           {\"key\": \"value2\", \"count\": 45},\n      \
        \                  ],\n                    },\n                    \"numeric_field\"\
        : {\n                        \"buckets\": [\n                            {\"\
        key\": [20, 30], \"count\": 100},\n                            {\"key\": [30,\
        \ 40], \"count\": 44},\n                        ],\n                    },\n\
        \                }\n            },\n            \"cohort2\": {\n         \
        \       \"facets\": { [...] }\n            },\n        }"
      operationId: compare_facets_compare_facets_post
      parameters:
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacetComparisonRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Compare Facets Compare Facets Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Compare Facets
      tags:
      - Compare
  /compare/intersection:
    post:
      description: "Get the number of documents at the intersection between two cohorts,\
        \ as well as the number\nof documents that only belong to either one of the\
        \ cohorts. Useful to generate Venn diagrams.\n\nBody:\n- **doc_type**: the\
        \ cohorts' ES document type\n- **cohort1**: filter corresponding to the first\
        \ cohort to compare\n- **cohort2**: filter corresponding to the second cohort\
        \ to compare\n- **precision_threshold** (default: 3000): option to trade memory\
        \ for accuracy when querying cardinality in ES\n\nReturns:\n    dict - example:\n\
        \n        {\n            \"cohort1\": <number of documents that are in cohort1\
        \ and not in cohort2>,\n            \"cohort2\": <number of documents that\
        \ are in cohort2 and not in cohort1>,\n            \"intersection\": <number\
        \ of documents that are in both cohorts>,\n        }"
      operationId: get_cohort_intersection_compare_intersection_post
      parameters:
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntersectionRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Get Cohort Intersection Compare Intersection Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Cohort Intersection
      tags:
      - Compare
  /files/:
    post:
      description: Performs a files query and returns case metadata for the matching
        files.
      operationId: query_files_files__post
      parameters:
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilesRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the cohort query
        '400':
          description: The request body is missing required fields or has invalid
            values.
        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      summary: Query case metadata
      tags:
      - Files
  /files/{file_id}:
    get:
      description: Performs a files query and returns file metadata for file id
      operationId: get_file_by_id_files__file_id__get
      parameters:
      - description: file id
        in: path
        name: file_id
        required: true
        schema:
          description: file id
          title: File Id
          type: string
      - in: cookie
        name: access_token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the file query
        '400':
          description: The request body is missing required fields or has invalid
            values.
        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      summary: Get file id metadata
      tags:
      - Files
  /genomic/gene_facets:
    post:
      operationId: gene_facets_genomic_gene_facets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacetRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Gene Facets
      tags:
