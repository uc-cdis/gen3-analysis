        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      summary: Top Genes by Cohort, Gene, and SSM
      tags:
      - Genomic
  /genomic/gene_table:
    post:
      description: Returns pages gene frequency table filtered by cohort, gene, and
        ssm filters
      operationId: gene_table_genomic_gene_table_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopGeneChartRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the table query
        '400':
