        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: 'Mutation Frequency: Gene Table'
      tags:
      - Genomic
  /genomic/ssm_facets:
    post:
      operationId: ssm_facets_genomic_ssm_facets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacetRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Ssm Facets
      tags:
      - Genomic
  /genomic/ssm_frequency_chart:
    post:
      description: Returns top ssms filtered by cohort, gene, and ssm filters
      operationId: ssm_frequency_chart_genomic_ssm_frequency_chart_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopGeneChartRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successfully processed the chart query
        '400':
          description: The request body is missing required fields or has invalid
            values.
        '401':
          description: User unauthorized when accessing endpoint
        '403':
          description: User does not have access to requested data
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Something went wrong internally when processing the request
      summary: Top SSMs by Cohort, Gene, and SSM
      tags:
      - Genomic
  /genomic/ssm_table:
    post:
      operationId: ssm_table_genomic_ssm_table_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopGeneChartRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
